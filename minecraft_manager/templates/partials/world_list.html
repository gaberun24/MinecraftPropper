<div id="world-list">
    {% if flash is defined and flash %}
    <div class="flash {{ flash_type|default('success') }}">{{ flash }}</div>
    {% endif %}

    <article>
        <header>Worlds</header>
        {% if worlds %}
        <figure>
        <table>
            <thead>
                <tr>
                    <th>World</th>
                    <th>Size</th>
                    <th>Dims</th>
                    <th>Modified</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for world in worlds %}
                <tr>
                    <td>
                        <strong>{{ world.name }}</strong>
                        {% if world.is_active %} <mark>active</mark>{% endif %}
                    </td>
                    <td>{{ world.size_human }}</td>
                    <td>
                        <small>
                            OW{% if world.has_nether %}+N{% endif %}{% if world.has_end %}+E{% endif %}
                        </small>
                    </td>
                    <td>
                        {% if world.last_modified %}
                        <small>{{ world.last_modified.strftime('%m-%d %H:%M') }}</small>
                        {% else %}-{% endif %}
                    </td>
                    <td style="white-space:nowrap;">
                        {% if not world.is_active %}
                        <button class="outline" hx-post="/worlds/{{ world.name }}/activate"
                                hx-target="#world-list" hx-swap="outerHTML"
                                hx-confirm="Activate '{{ world.name }}'? Server will restart.">
                            Activate
                        </button>
                        {% endif %}

                        <button class="outline"
                                hx-get="/worlds/{{ world.name }}/config"
                                hx-target="#config-dialog-content"
                                hx-swap="innerHTML"
                                onclick="document.getElementById('config-dialog').showModal()">
                            Config
                        </button>

                        <button class="outline" hx-post="/worlds/{{ world.name }}/snapshot"
                                hx-target="#world-list" hx-swap="outerHTML">
                            Snapshot
                        </button>

                        <a href="/worlds/{{ world.name }}/download" role="button" class="outline">
                            DL
                        </a>

                        <button class="outline" onclick="promptDuplicate('{{ world.name }}')">
                            Clone
                        </button>

                        <button class="outline" onclick="promptRename('{{ world.name }}')">
                            Rename
                        </button>

                        {% if not world.is_active %}
                        <button class="outline secondary"
                                hx-delete="/worlds/{{ world.name }}"
                                hx-target="#world-list" hx-swap="outerHTML"
                                hx-confirm="DELETE '{{ world.name }}'? Auto-snapshot will be created first.">
                            Del
                        </button>
                        {% endif %}

                        {% if world.snapshots %}
                        <details style="margin-top:0.3rem;">
                            <summary><small>Snapshots ({{ world.snapshots|length }})</small></summary>
                            <ul style="font-size:0.75rem; padding-left:1rem;">
                                {% for snap in world.snapshots %}
                                <li>
                                    {{ snap.filename }} ({{ snap.size_human }})
                                    <button class="outline secondary" style="padding:0.1rem 0.3rem; font-size:0.65rem;"
                                            hx-post="/worlds/{{ world.name }}/restore"
                                            hx-target="#world-list" hx-swap="outerHTML"
                                            hx-vals='{"snapshot_path": "{{ snap.path }}"}'
                                            hx-confirm="Restore from this snapshot?">
                                        Restore
                                    </button>
                                </li>
                                {% endfor %}
                            </ul>
                        </details>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </figure>
        {% else %}
        <p><em>No worlds found</em></p>
        {% endif %}
    </article>
</div>

<script>
function promptDuplicate(name) {
    const n = prompt("New name for the clone:");
    if (n) htmx.ajax('POST', `/worlds/${name}/duplicate`, {target:'#world-list', swap:'outerHTML', values:{new_name:n}});
}
function promptRename(name) {
    const n = prompt("New name:");
    if (n) htmx.ajax('POST', `/worlds/${name}/rename`, {target:'#world-list', swap:'outerHTML', values:{new_name:n}});
}
</script>
