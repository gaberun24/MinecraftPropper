<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Minecraft Manager{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>Minecraft Manager</strong></li>
        </ul>
        <ul>
            <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/console" class="{% if active_page == 'console' %}active{% endif %}">Console</a></li>
            <li><a href="/backups" class="{% if active_page == 'backups' %}active{% endif %}">Backups</a></li>
            <li><a href="/updates" class="{% if active_page == 'updates' %}active{% endif %}">Updates</a></li>
            <li><a href="/worlds" class="{% if active_page == 'worlds' %}active{% endif %}">Worlds</a></li>
            <li><a href="/settings" class="{% if active_page == 'settings' %}active{% endif %}">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        <div id="flash-messages"></div>
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
